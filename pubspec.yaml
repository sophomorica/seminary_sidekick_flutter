name: seminary_sidekick
description: Master the Doctrinal Mastery scriptures through fun, addictive games.
publish_to: "none"
version: 1.0.2+5

environment:
  sdk: ">=3.2.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3

  # Local Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Navigation
  go_router: ^13.0.0

  # Animations
  flutter_animate: ^4.3.0
  rive: ^0.12.4

  # UI Enhancements
  google_fonts: ^6.1.0
  flutter_svg: ^2.0.9
  shimmer: ^3.0.0
  percent_indicator: ^4.2.3
  confetti: ^0.7.0

  # Haptics & Audio
  audioplayers: ^5.2.1

  # Speech Recognition
  speech_to_text: ^6.6.0

  # In-App Purchases (RevenueCat)
  purchases_flutter: ^8.1.0

  # Backend (Group Play multiplayer — Supabase Realtime + Postgres + Anonymous Auth)
  supabase_flutter: ^2.5.0

  # Crash reporting & error analytics (no-op unless SENTRY_DSN is dart-defined)
  sentry_flutter: ^9.16.0

  # QR codes (host lobby join code → scannable)
  qr_flutter: ^4.1.0

  # Sharing
  share_plus: ^10.1.4
  path_provider: ^2.1.2

  # Open external links (privacy policy, etc.)
  url_launcher: ^6.2.0

  # Utilities
  uuid: ^4.2.2
  intl: ^0.19.0
  collection: ^1.18.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  hive_generator: ^2.0.1
  build_runner: ^2.4.7
  riverpod_generator: ^2.3.9
  mockito: ^5.4.4
  fake_async: ^1.3.1
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true

  assets:
    - assets/data/
    - assets/audio/
    - assets/icon/
    - assets/images/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#D9805F"
  adaptive_icon_foreground: "assets/icon/app_icon.png"
