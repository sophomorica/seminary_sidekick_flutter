name: seminary_sidekick
description: Master the Doctrinal Mastery scriptures through fun, addictive games.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.2.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3

  # Local Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Navigation
  go_router: ^13.0.0

  # Animations
  flutter_animate: ^4.3.0
  rive: ^0.12.4

  # UI Enhancements
  google_fonts: ^6.1.0
  flutter_svg: ^2.0.9
  shimmer: ^3.0.0
  percent_indicator: ^4.2.3
  confetti: ^0.7.0

  # Haptics & Audio
  audioplayers: ^5.2.1

  # Utilities
  uuid: ^4.2.2
  intl: ^0.19.0
  collection: ^1.18.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  hive_generator: ^2.0.1
  build_runner: ^2.4.7
  riverpod_generator: ^2.3.9

flutter:
  uses-material-design: true

  assets:
    - assets/data/
